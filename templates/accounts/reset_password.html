{% extends "base/base.html" %}

{% block title %}Reset password Nexo{% endblock %}

{% block extra_head %}
<style>
#navbar, #mobile-tabbar, #mobile-search, footer { display: none !important; }
.page-content { padding-top: 0 !important; }
.auth-center { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; background: var(--bg); }
.auth-card { width: 100%; max-width: 420px; }
.auth-brand { font-family: 'Clash Display', sans-serif; font-size: 22px; font-weight: 700; color: var(--text); letter-spacing: -0.02em; text-decoration: none; display: block; text-align: center; margin-bottom: 32px; }
.auth-brand span { color: var(--accent); }
.field-label { display: block; font-family: 'Satoshi', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; }
.field-group { margin-bottom: 18px; }
.auth-input { width: 100%; padding: 13px 44px 13px 42px; background: var(--surface); border: 1.5px solid var(--border); border-radius: 10px; font-family: 'Satoshi', sans-serif; font-size: 14px; color: var(--text); outline: none; transition: border-color 0.2s, box-shadow 0.2s; box-sizing: border-box; }
.auth-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(201,80,42,0.1); }
.auth-submit { width: 100%; padding: 14px; background: var(--text); color: var(--bg); border: none; border-radius: 10px; font-family: 'Satoshi', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; transition: opacity 0.2s; }
.auth-submit:hover { opacity: 0.85; }
.toggle-pw { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 16px; display: flex; align-items: center; }
</style>
{% endblock %}

{% block content %}
<div class="auth-center">
  <div class="auth-card" x-data="{ showPw: false, showPw2: false }">
    <a href="/" class="auth-brand">NE<span>X</span>O</a>
    <div style="text-align:center;margin-bottom:28px;">
      <div style="width:56px;height:56px;border-radius:14px;background:var(--accent-soft);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;">
        <iconify-icon icon="heroicons:lock-open" style="font-size:26px;color:var(--accent);"></iconify-icon>
      </div>
      <div style="font-family:'Clash Display',sans-serif;font-size:30px;font-weight:700;color:var(--text);letter-spacing:-0.02em;margin-bottom:6px;">Set new password</div>
      <p style="font-family:'Satoshi',sans-serif;font-size:14px;color:var(--text-muted);line-height:1.6;">Choose a strong password you haven't used before.</p>
    </div>

    <form method="post">
      {% csrf_token %}
      <div class="field-group">
        <label class="field-label">New password</label>
        <div style="position:relative;">
          <iconify-icon icon="heroicons:lock-closed" style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:16px;pointer-events:none;"></iconify-icon>
          <input :type="showPw ? 'text' : 'password'" name="password1" class="auth-input" placeholder="Min. 8 characters" required>
          <button type="button" class="toggle-pw" @click="showPw = !showPw">
            <iconify-icon :icon="showPw ? 'heroicons:eye-slash' : 'heroicons:eye'"></iconify-icon>
          </button>
        </div>
      </div>
      <div class="field-group">
        <label class="field-label">Confirm password</label>
        <div style="position:relative;">
          <iconify-icon icon="heroicons:lock-closed" style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:16px;pointer-events:none;"></iconify-icon>
          <input :type="showPw2 ? 'text' : 'password'" name="password2" class="auth-input" placeholder="Repeat new password" required>
          <button type="button" class="toggle-pw" @click="showPw2 = !showPw2">
            <iconify-icon :icon="showPw2 ? 'heroicons:eye-slash' : 'heroicons:eye'"></iconify-icon>
          </button>
        </div>
      </div>
      <button type="submit" class="auth-submit">Reset password</button>
    </form>
  </div>
</div>
{% endblock %}
