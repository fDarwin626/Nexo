<!DOCTYPE html>
<html>
<body>

<h1>Open a Dispute</h1>
<p>Order: {{ seller_order.order.order_ref }} — {{ seller_order.seller.store_name }}</p>

<hr>

<p style="color:red;">
    Only open a dispute if you have a genuine issue.
    False disputes may result in your POD privilege being revoked.
</p>

<form method="post" enctype="multipart/form-data">
    {% csrf_token %}

    <p>
        <label>Reason:</label><br>
        <select name="reason" required>
            <option value="">-- Select Reason --</option>
            {% for value, label in reason_choices %}
            <option value="{{ value }}">{{ label }}</option>
            {% endfor %}
        </select>
    </p>

    <p>
        <label>Describe what happened (be specific):</label><br>
        <textarea name="description" rows="6" cols="60" required
            placeholder="Eg: I received a broken item. The screen was cracked when I opened the package...">
        </textarea>
    </p>

    <p>
        <label>Evidence Photo 1 (optional):</label><br>
        <input type="file" name="evidence_photo_1" accept="image/*">
    </p>
    <p>
        <label>Evidence Photo 2 (optional):</label><br>
        <input type="file" name="evidence_photo_2" accept="image/*">
    </p>
    <p>
        <label>Evidence Photo 3 (optional):</label><br>
        <input type="file" name="evidence_photo_3" accept="image/*">
    </p>
    <p>
        <label>Evidence Video URL (optional — YouTube/Google Drive link):</label><br>
        <input type="url" name="evidence_video_url" placeholder="https://...">
    </p>

    <button type="submit" style="color:red;">Submit Dispute</button>
    <a href="{% url 'orders:order_detail' order_ref=seller_order.order.order_ref %}">Cancel</a>
</form>

</body>
</html>
